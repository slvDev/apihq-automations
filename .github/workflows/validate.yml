name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install PyYAML
        run: pip install pyyaml==6.0.3
      - name: Validate workflow JSON, node graphs, and Actions YAML
        run: python3 scripts/validate.py
      - name: Lint GitHub Actions templates
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/011a6d15e749bb3f2d771eed9c7aa0e7e3e10ee7/scripts/download-actionlint.bash) 1.7.12
          ./actionlint github-actions/*.yml
